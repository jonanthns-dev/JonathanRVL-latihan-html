    <form action="#" method="post" style="width: 400px; display: flex; flex-direction: column; gap: 10px;">

        <label for="nama">Nama Lengkap</label>
        <input type="text" id="nama" name="nama" required>

        <label for="produk">Pilih Produk</label>
        <select id="produk" name="produk" required>
            <option value="">-- Pilih Produk --</option>
            <option value="Monaco Royale">Monaco Royale</option>
            <option value="On The Rocks">On The Rocks</option>
            <option value="Sansa">Sansa</option>
        </select>

        <label for="jumlah">Jumlah</label>
        <input type="number" id="jumlah" name="jumlah" min="1" required>

        <label for="alamat">Alamat</label>
        <textarea id="alamat" name="alamat" rows="3" required></textarea>

        <label for="pembayaran">Metode Pembayaran</label>
        <select id="pembayaran" name="pembayaran" required>
            <option value="">-- Pilih Metode Pembayaran --</option>
            <option value="Transfer Bank">Transfer Bank</option>
            <option value="COD">COD (Bayar di Tempat)</option>
            <option value="E-Wallet">E-Wallet</option>
        </select>

        <button type="submit">Beli Sekarang</button>
        <button type="reset">Reset</button>

    </form>

</body>
